name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

# Backend URL is public — baked into frontend bundles at build time
env:
  VITE_API_URL: https://uchqun-production-b484.up.railway.app/api

jobs:
  # Backend: no pre-build needed — Railway builds it server-side
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend (Uchqun) to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping deployment."
            exit 0
          fi
          npm install -g @railway/cli
          railway up --service Uchqun --detach
          echo "Backend deployment triggered."

  # Frontends: build here (so ../shared is accessible), upload pre-built dist
  deploy-frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: admin
            service: admin
            label: Admin
          - app: teacher
            service: teacher
            label: Teacher
          - app: reception
            service: reception
            label: Reception
          - app: government
            service: government
            label: Government
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build ${{ matrix.label }}
        run: |
          cd ${{ matrix.app }}
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Deploy ${{ matrix.label }} to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping deployment."
            exit 0
          fi
          npm install -g @railway/cli
          railway up --service ${{ matrix.service }} --detach
          echo "${{ matrix.label }} deployment triggered."
