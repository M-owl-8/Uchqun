<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="226" fill="#F4EDE2"/>
  
  <!-- Soft decorative circles -->
  <circle cx="150" cy="150" r="120" fill="#DFF4EC" opacity="0.4"/>
  <circle cx="900" cy="200" r="140" fill="#BFD7EA" opacity="0.3"/>
  <circle cx="200" cy="900" r="160" fill="#F8D7C4" opacity="0.3"/>
  <circle cx="850" cy="850" r="130" fill="#E8C27E" opacity="0.35"/>
  
  <!-- Central design - Protective hands forming heart shape with child -->
  <g transform="translate(512, 512)">
    
    <!-- Left hand (palm up, supporting) -->
    <g transform="translate(-140, 30)">
      <ellipse cx="0" cy="0" rx="85" ry="100" fill="#BFD7EA" opacity="0.9"/>
      <!-- Fingers -->
      <ellipse cx="-35" cy="-60" rx="20" ry="55" fill="#BFD7EA" opacity="0.9" transform="rotate(-15 -35 -60)"/>
      <ellipse cx="-12" cy="-70" rx="18" ry="60" fill="#BFD7EA" opacity="0.9" transform="rotate(-5 -12 -70)"/>
      <ellipse cx="12" cy="-72" rx="18" ry="62" fill="#BFD7EA" opacity="0.9" transform="rotate(5 12 -72)"/>
      <ellipse cx="35" cy="-65" rx="20" ry="58" fill="#BFD7EA" opacity="0.9" transform="rotate(15 35 -65)"/>
      <!-- Thumb -->
      <ellipse cx="-60" cy="-15" rx="28" ry="50" fill="#BFD7EA" opacity="0.9" transform="rotate(-35 -60 -15)"/>
    </g>
    
    <!-- Right hand (palm up, supporting) -->
    <g transform="translate(140, 30) scale(-1, 1)">
      <ellipse cx="0" cy="0" rx="85" ry="100" fill="#DFF4EC" opacity="0.9"/>
      <!-- Fingers -->
      <ellipse cx="-35" cy="-60" rx="20" ry="55" fill="#DFF4EC" opacity="0.9" transform="rotate(-15 -35 -60)"/>
      <ellipse cx="-12" cy="-70" rx="18" ry="60" fill="#DFF4EC" opacity="0.9" transform="rotate(-5 -12 -70)"/>
      <ellipse cx="12" cy="-72" rx="18" ry="62" fill="#DFF4EC" opacity="0.9" transform="rotate(5 12 -72)"/>
      <ellipse cx="35" cy="-65" rx="20" ry="58" fill="#DFF4EC" opacity="0.9" transform="rotate(15 35 -65)"/>
      <!-- Thumb -->
      <ellipse cx="-60" cy="-15" rx="28" ry="50" fill="#DFF4EC" opacity="0.9" transform="rotate(-35 -60 -15)"/>
    </g>
    
    <!-- Happy child figure -->
    <g transform="translate(0, -60)">
      <!-- Head with smile -->
      <circle cx="0" cy="0" r="45" fill="#2E3A59"/>
      
      <!-- Happy face -->
      <circle cx="-15" cy="-8" r="5" fill="#F4EDE2"/>
      <circle cx="15" cy="-8" r="5" fill="#F4EDE2"/>
      <path d="M -18,10 Q 0,25 18,10" 
            stroke="#F4EDE2" 
            stroke-width="4" 
            stroke-linecap="round" 
            fill="none"/>
      
      <!-- Body -->
      <ellipse cx="0" cy="75" rx="48" ry="60" fill="#2E3A59"/>
      
      <!-- Arms spread wide (welcoming/joyful) -->
      <path d="M -42,55 Q -70,45 -85,60" 
            stroke="#2E3A59" 
            stroke-width="20" 
            stroke-linecap="round" 
            fill="none"/>
      <path d="M 42,55 Q 70,45 85,60" 
            stroke="#2E3A59" 
            stroke-width="20" 
            stroke-linecap="round" 
            fill="none"/>
      
      <!-- Legs -->
      <path d="M -18,125 L -22,160" 
            stroke="#2E3A59" 
            stroke-width="18" 
            stroke-linecap="round"/>
      <path d="M 18,125 L 22,160" 
            stroke="#2E3A59" 
            stroke-width="18" 
            stroke-linecap="round"/>
    </g>
    
    <!-- Heart shape formed by hands (outline) -->
    <path d="M -120,-100 
             Q -180,-160 -180,-80
             Q -180,0 0,150
             Q 180,0 180,-80
             Q 180,-160 120,-100" 
          stroke="#E8C27E" 
          stroke-width="6" 
          fill="none" 
          opacity="0.7"
          stroke-linecap="round"/>
    
    <!-- Sparkles for hope -->
    <g fill="#E8C27E" opacity="0.8">
      <circle cx="-160" cy="-130" r="8"/>
      <circle cx="160" cy="-130" r="8"/>
      <circle cx="-140" cy="80" r="6"/>
      <circle cx="140" cy="80" r="6"/>
      
      <!-- Star sparkles -->
      <path d="M 0,-180 l 5,12 l 12,5 l -12,5 l -5,12 l -5,-12 l -12,-5 l 12,-5 Z"/>
      <path d="M -100,-160 l 4,10 l 10,4 l -10,4 l -4,10 l -4,-10 l -10,-4 l 10,-4 Z" opacity="0.7"/>
      <path d="M 100,-160 l 4,10 l 10,4 l -10,4 l -4,10 l -4,-10 l -10,-4 l 10,-4 Z" opacity="0.7"/>
    </g>
  </g>
</svg>
