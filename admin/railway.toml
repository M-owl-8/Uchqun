[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

# dist/ is pre-built in GitHub Actions where ../shared is accessible.
# Railway only needs production deps to run server.js.
[phases.install]
cmds = ["npm ci --omit=dev"]

[phases.build]
cmds = ["echo 'Pre-built in CI'"]
