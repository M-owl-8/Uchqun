name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: |
          if [ -f "backend/.eslintrc.cjs" ] || [ -f "backend/.eslintrc.js" ] || [ -f "backend/.eslintrc.json" ]; then
            cd backend && npm ci && npx eslint . --ext .js --max-warnings 0
          else
            echo "No ESLint config found, skipping"
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Audit backend production dependencies
        run: cd backend && npm audit --audit-level=high --omit=dev
      - name: Audit frontend dependencies
        run: |
          for app in admin teacher reception government; do
            echo "Auditing $app..."
            cd $GITHUB_WORKSPACE/$app && npm audit --audit-level=high
          done

  sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: Trivy — block on CRITICAL/HIGH (table mode)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'
      - name: Trivy — generate SARIF for Security tab
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uchqun_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: uchqun_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-test-jwt-secret-that-is-at-least-32-chars
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      FRONTEND_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: cd backend && npm ci
      - name: Run backend tests with coverage
        run: cd backend && npm test -- --coverage

  test-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin, teacher, reception, government]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: cd ${{ matrix.app }} && npm ci
      - name: Run frontend tests
        run: |
          cd ${{ matrix.app }}
          RESULT=$(npm test -- --run --reporter=verbose 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -q "No test files found"; then
            echo "ERROR: No test files found in ${{ matrix.app }}. Tests are required."
            exit 1
          fi

  lint-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin, teacher, reception, government]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: cd ${{ matrix.app }} && npm ci
      - name: Run ESLint
        run: cd ${{ matrix.app }} && npm run lint

  build:
    runs-on: ubuntu-latest
    needs: [lint, lint-frontend, security, sast, test-backend, test-frontend]
    strategy:
      matrix:
        app: [admin, teacher, reception, government]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: cd ${{ matrix.app }} && npm ci
      - run: cd ${{ matrix.app }} && npm run build
