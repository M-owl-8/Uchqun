name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            label: Backend
          - service: admin
            label: Admin
          - service: teacher
            label: Teacher
          - service: reception
            label: Reception
          - service: government
            label: Government
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.label }} to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN secret is not set — skipping Railway deployment."
            echo "Add RAILWAY_TOKEN to GitHub repository secrets to enable auto-deploy."
            exit 0
          fi
          npm install -g @railway/cli
          railway up --service ${{ matrix.service }} --detach
          echo "${{ matrix.label }} deployment triggered successfully."
