<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1024" height="1024" rx="226" fill="url(#bg-gradient)"/>
  
  <!-- Floating decorative elements -->
  <circle cx="180" cy="180" r="140" fill="#DFF4EC" opacity="0.35"/>
  <circle cx="860" cy="170" r="160" fill="#BFD7EA" opacity="0.3"/>
  <circle cx="190" cy="850" r="170" fill="#F8D7C4" opacity="0.28"/>
  <circle cx="880" cy="880" r="150" fill="#E8C27E" opacity="0.32"/>
  
  <!-- Center circular badge design -->
  <g transform="translate(512, 512)">
    
    <!-- Outer circle (soft navy) -->
    <circle cx="0" cy="0" r="280" fill="#2E3A59" opacity="0.95"/>
    
    <!-- Inner circle with gradient -->
    <circle cx="0" cy="0" r="240" fill="url(#inner-gradient)"/>
    
    <!-- Simple child icon with raised arms (celebrating/free) -->
    <g transform="translate(0, 0)">
      <!-- Head -->
      <circle cx="0" cy="-50" r="50" fill="#2E3A59"/>
      
      <!-- Smiling face -->
      <g fill="#FFFFFF">
        <circle cx="-18" cy="-58" r="7"/>
        <circle cx="18" cy="-58" r="7"/>
      </g>
      <path d="M -22,-35 Q 0,-22 22,-35" 
            stroke="#FFFFFF" 
            stroke-width="5" 
            stroke-linecap="round" 
            fill="none"/>
      
      <!-- Body (simple rounded shape) -->
      <rect x="-40" y="10" width="80" height="85" rx="40" fill="#2E3A59"/>
      
      <!-- Arms raised up in V shape (victory/joy) -->
      <g stroke="#2E3A59" stroke-width="28" stroke-linecap="round" fill="none">
        <path d="M -35,15 L -80,-35"/>
        <path d="M 35,15 L 80,-35"/>
      </g>
      
      <!-- Hands (rounded) -->
      <circle cx="-80" cy="-35" r="18" fill="#2E3A59"/>
      <circle cx="80" cy="-35" r="18" fill="#2E3A59"/>
      
      <!-- Legs -->
      <g stroke="#2E3A59" stroke-width="24" stroke-linecap="round">
        <path d="M -18,95 L -22,135"/>
        <path d="M 18,95 L 22,135"/>
      </g>
      
      <!-- Feet -->
      <ellipse cx="-22" cy="140" rx="16" ry="10" fill="#2E3A59"/>
      <ellipse cx="22" cy="140" rx="16" ry="10" fill="#2E3A59"/>
    </g>
    
    <!-- Hearts floating around (care theme) -->
    <g fill="#E8C27E" opacity="0.9">
      <!-- Top right heart -->
      <path d="M 140,-140 
               c -8,-12 -28,-12 -28,0 
               c 0,12 14,24 28,36 
               c 14,-12 28,-24 28,-36 
               c 0,-12 -20,-12 -28,0 Z" 
            transform="scale(1.3)"/>
      
      <!-- Left heart -->
      <path d="M -160,-40 
               c -7,-10 -24,-10 -24,0 
               c 0,10 12,20 24,30 
               c 12,-10 24,-20 24,-30 
               c 0,-10 -17,-10 -24,0 Z" 
            transform="scale(1.2)"/>
      
      <!-- Bottom right heart -->
      <path d="M 145,130 
               c -6,-9 -22,-9 -22,0 
               c 0,9 11,18 22,27 
               c 11,-9 22,-18 22,-27 
               c 0,-9 -16,-9 -22,0 Z" 
            transform="scale(1.1)"/>
      
      <!-- Top left heart (small) -->
      <path d="M -130,-150 
               c -5,-7 -18,-7 -18,0 
               c 0,7 9,14 18,21 
               c 9,-7 18,-14 18,-21 
               c 0,-7 -13,-7 -18,0 Z"/>
    </g>
    
    <!-- Sparkles for magic/hope -->
    <g fill="#FFFFFF" opacity="0.8">
      <path d="M 0,-220 l 6,15 l 15,6 l -15,6 l -6,15 l -6,-15 l -15,-6 l 15,-6 Z"/>
      <path d="M 180,-90 l 5,12 l 12,5 l -12,5 l -5,12 l -5,-12 l -12,-5 l 12,-5 Z"/>
      <path d="M -170,10 l 5,12 l 12,5 l -12,5 l -5,12 l -5,-12 l -12,-5 l 12,-5 Z"/>
      <path d="M 90,180 l 4,10 l 10,4 l -10,4 l -4,10 l -4,-10 l -10,-4 l 10,-4 Z"/>
      <path d="M -100,190 l 4,10 l 10,4 l -10,4 l -4,10 l -4,-10 l -10,-4 l 10,-4 Z"/>
    </g>
  </g>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4EDE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEFAF5;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="inner-gradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#DFF4EC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#BFD7EA;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#BFD7EA;stop-opacity:0.9" />
    </radialGradient>
  </defs>
</svg>
